name: Release

# Cut a release by pushing a version tag:
#   npm version patch && git push --follow-tags
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # One arch per job: signing logs stay visible, failures are isolated,
        # and each pass is ~half the timestamp round-trips of a combined build.
        # x64 runs on Intel (macos-13): cross-signing x64 on Apple Silicon has
        # hung for hours on codesign with no log output in CI.
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build, sign & notarize (${{ matrix.arch }})
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8 }}
          DEBUG: electron-osx-sign*
        run: |
          printf '%s' "$APPLE_API_KEY_P8_B64" | base64 -d > "$RUNNER_TEMP/api_key.p8"
          export APPLE_API_KEY="$RUNNER_TEMP/api_key.p8"
          npm run build
          npx electron-builder --mac --${{ matrix.arch }} --publish never
          rm -f "$RUNNER_TEMP/api_key.p8"

      - name: Upload ${{ matrix.arch }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: mac-*
          merge-multiple: true
          path: release

      - name: Publish to release (overwrite existing assets)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$tag" --repo "$GITHUB_REPOSITORY" --draft --title "$tag" --notes "Automated build for $tag."
          gh release upload "$tag" --repo "$GITHUB_REPOSITORY" --clobber \
            release/*.dmg release/*.zip
