# CI release on tag push (primary). Manual fallback: Actions → release → Run workflow.
# Flow: npm version patch && git push --follow-tags
name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          # x64 cross-compiles on Apple Silicon runners — avoids macos-13 queue
          - arch: x64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          # Tag push: checkout the tagged commit (package.json version must match tag).
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Developer ID certificate
        id: certs
        uses: apple-actions/import-codesign-certs@v3
        with:
          keychain: signing_temp
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Package (${{ matrix.arch }})
        env:
          CSC_KEYCHAIN_PASSWORD: ${{ steps.certs.outputs.keychain-password }}
        run: |
          export CSC_KEYCHAIN="$HOME/Library/Keychains/signing_temp.keychain-db"
          ./packaging/package.sh --${{ matrix.arch }}

      - name: Notarize DMG (${{ matrix.arch }})
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          printf '%s' "$APPLE_API_KEY_P8_B64" | base64 -d > "$RUNNER_TEMP/api_key.p8"
          export APPLE_API_KEY="$RUNNER_TEMP/api_key.p8"
          VERSION=$(node -p "require('./package.json').version")
          ./packaging/notarize.sh "release/KeyMIDI-$VERSION-${{ matrix.arch }}.dmg"
          rm -f "$RUNNER_TEMP/api_key.p8"

      - name: Upload ${{ matrix.arch }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Tag push: checkout the tagged commit (package.json version must match tag).
          ref: ${{ github.ref }}

      - uses: actions/download-artifact@v4
        with:
          pattern: mac-*
          merge-multiple: true
          path: release

      - name: Publish to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./packaging/publish.sh
