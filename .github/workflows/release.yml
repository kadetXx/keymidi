name: Release

# Cut a release by pushing a version tag:
#   npm version patch && git push --follow-tags
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    # One Apple Silicon runner builds + signs BOTH arches (x64 cross-signed).
    # The earlier "x64 hangs for hours on codesign" was the headless keychain
    # prompt fixed below — not cross-signing — so we don't need the scarce
    # macos-13 Intel runner. timeout-minutes fails fast if Apple's notary is
    # backed up rather than burning the default 6h.
    runs-on: macos-latest
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Developer ID certificate
        # THE signing-hang fix. Imports the cert into a dedicated keychain and
        # sets its key-partition-list, so `codesign` uses the key WITHOUT the
        # macOS "allow keychain access" prompt — that prompt is invisible in
        # headless CI and hangs the job until timeout. electron-builder then
        # auto-discovers this identity, so we no longer pass CSC_LINK to it.
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build, sign & notarize (arm64 + x64)
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          # materialize the App Store Connect API key for notarization
          printf '%s' "$APPLE_API_KEY_P8_B64" | base64 -d > "$RUNNER_TEMP/api_key.p8"
          export APPLE_API_KEY="$RUNNER_TEMP/api_key.p8"
          npm run build
          npx electron-builder --mac --arm64 --x64 --publish never
          rm -f "$RUNNER_TEMP/api_key.p8"

      - name: Publish to release (overwrite existing assets)
        # electron-builder's own publisher skips assets that already exist on a
        # draft; `gh release upload --clobber` always replaces them.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$tag" --repo "$GITHUB_REPOSITORY" --draft --title "$tag" --notes "Automated build for $tag."
          gh release upload "$tag" --repo "$GITHUB_REPOSITORY" --clobber \
            release/*.dmg release/*.zip
