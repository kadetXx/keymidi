name: Release

# Cut a release by pushing a version tag:
#   npm version patch && git push --follow-tags
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    # A single Apple Silicon runner builds BOTH architectures. electron-builder
    # cross-packages the x64 app from here (the native modules ship prebuilt
    # darwin-x64 binaries), so we don't depend on GitHub's scarce macos-13
    # Intel runners, which can sit queued for 30+ minutes.
    runs-on: macos-latest
    permissions:
      contents: write # create the GitHub Release + upload artifacts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish (arm64 + x64)
        # mac.target in package.json lists both arches, so `electron-builder
        # --mac` produces arm64 + x64 dmg/zip and uploads them to the draft
        # release for this tag.
        run: npm run dist:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
