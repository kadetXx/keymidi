<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    KeyMIDI app icon — the "lil" tray glyph (two tall bars flanking a shorter
    dotted "i") on the app's charcoal faceplate. Monochrome: all three bars
    share the off-white silkscreen tone, no accent. Corners are transparent.
    Render with rsvg-convert (qlmanage bakes a white background). See
    packaging/make-icon.sh.
  -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="#1c1f24"/>

  <!-- glyph: l  i(dotted)  l  — the i sits in the middle -->
  <rect x="316" y="326" width="104" height="372" rx="18" fill="#E8E6DF"/>
  <circle cx="512" cy="360" r="42" fill="#E8E6DF"/>
  <rect x="460" y="430" width="104" height="268" rx="18" fill="#E8E6DF"/>
  <rect x="604" y="326" width="104" height="372" rx="18" fill="#E8E6DF"/>
</svg>
